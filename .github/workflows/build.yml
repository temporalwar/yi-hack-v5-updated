name: Build & Release

on:
  push:
    branches: [ master ]
    paths:
      - 'Makefile'
      - 'Dockerfile'
      - 'scripts/**'
      - 'patches/**'
      - 'script/**'
      - 'www/**'
      - 'etc/**'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  build:
    name: Cross-compile ARM packages
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Build Docker image ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: yi-hack-builder:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing unboundedly
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── Run the build ────────────────────────────────────────────────────
      - name: Run cross-compilation
        run: |
          mkdir -p output
          docker run --rm \
            -v "${{ github.workspace }}/output:/build/output" \
            yi-hack-builder

      # ── Verify output ────────────────────────────────────────────────────
      - name: Verify output
        run: |
          echo "=== Build output ==="
          ls -lh output/
          test -f output/yi-hack-v5-updated-packages.tgz || \
            (echo "ERROR: output tarball missing" && exit 1)
          echo "=== Package versions ==="
          tar -xzf output/yi-hack-v5-updated-packages.tgz \
            -O yi-hack-v5/package-versions.txt 2>/dev/null || true

      # ── Upload build artifact (always kept for 30 days) ──────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: yi-hack-v5-updated-packages
          path: output/yi-hack-v5-updated-packages.tgz
          retention-days: 30

      # ── Create GitHub Release on master push ─────────────────────────────
      - name: Generate release tag
        id: tag
        run: echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Hardened Build ${{ steps.tag.outputs.tag }}"
          body: |
            ## Yi-Hack-V5 Hardened Security Build

            Automated build from commit ${{ github.sha }}

            ### Package versions
            | Package   | Version  |
            |-----------|----------|
            | OpenSSL   | 3.3.2    |
            | curl      | 8.20.0   |
            | dropbear  | 2025.89  |
            | mosquitto | 2.1.0    |
            | pure-ftpd | 1.0.52   |
            | libfuse3  | 3.18.1   |

            ### Installation
            1. Download `yi-hack-v5-updated-packages.tgz`
            2. Extract over your existing yi-hack-v5 SD card folder:
               ```
               tar -xzf yi-hack-v5-updated-packages.tgz -C /path/to/sdcard/
               ```
            3. Reinsert SD card and reboot camera

            ### Bug fixes included
            - `clean_records.sh`: fixed `continue` outside loop
            - `startup.sh`: fixed cron entries overwriting each other (`>` → `>>`)
            - `eventsdirdel.sh` / `eventsfiledel.sh`: fixed path traversal guard
            - `mqtt_adv_homeassistant.sh`: fixed missing `CONF_SYSTEM_FILE`, wrong QOS key
            - `check_conf.sh`: fixed `ONVIF_WSDD` default, fixed `grep` anchoring
          files: output/yi-hack-v5-updated-packages.tgz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
