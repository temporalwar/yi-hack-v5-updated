name: Cross-Compile Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Ensure this is the image containing your cross-compiler
      image: ubuntu:18.04 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Toolchain Config
        run: |
          mkdir -p /build/scripts
          cat <<EOF > /build/scripts/hisiv300.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)
          set(CMAKE_C_COMPILER /opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-gcc)
          set(CMAKE_CXX_COMPILER /opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-g++)
          set(CMAKE_SYSROOT /opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/armv5te_arm9_soft)
          set(CMAKE_FIND_ROOT_PATH \${CMAKE_SYSROOT})
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_EXE_LINKER_FLAGS "\${CMAKE_EXE_LINKER_FLAGS} -L\${CMAKE_SYSROOT}/lib -L\${CMAKE_SYSROOT}/usr/lib -Wl,-rpath-link,\${CMAKE_SYSROOT}/lib -Wl,-rpath-link,\${CMAKE_SYSROOT}/usr/lib")
          EOF

      - name: Verify Toolchain
        run: |
          if [ -f "/opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/armv5te_arm9_soft/usr/lib/crt1.o" ]; then
            echo "CRT files found, proceeding with build."
          else
            echo "ERROR: CRT files not found. The toolchain path might be incorrect."
            exit 1
          fi

      - name: Configure cJSON
        run: |
          mkdir -p /build/build/cJSON-1.7.18-build
          cd /build/build/cJSON-1.7.18-build
          cmake /build/build/cJSON-1.7.18 \
            -DCMAKE_TOOLCHAIN_FILE=/build/scripts/hisiv300.cmake \
            -DCMAKE_INSTALL_PREFIX=/build/staging \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DENABLE_CJSON_TEST=OFF \
            -DENABLE_CJSON_UTILS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON

      - name: Build cJSON
        run: |
          cd /build/build/cJSON-1.7.18-build
          make -j$(nproc)
          make install
