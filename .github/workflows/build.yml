name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Firmware
        run: |
          # Create a folder for our release
          mkdir -p ${{ github.workspace }}/release_package
          
          # Copy all important project files into the package folder
          # We skip the .git folder and our workflow folder to keep it clean
          rsync -av --exclude='.git' --exclude='.github' --exclude='release_package' . ${{ github.workspace }}/release_package/
          
          # Create the tar.gz file (this is what you download for your SD card)
          tar -czf yi-hack-v5-updated.tar.gz -C ${{ github.workspace }}/release_package .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yi-hack-v5-updated.tar.gz
          tag_name: latest
          name: Latest Build
          body: "Automated build of yi-hack-v5-updated. Extract the contents of this .tar.gz to the root of your SD card."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}