name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # This triggers the release only when you push a tag like v1.0.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          # Create working directories
          mkdir -p ${{ github.workspace }}/scripts
          mkdir -p ${{ github.workspace }}/build_output
          
          # [Keep your toolchain generation here]
          cat <<'EOF' > ${{ github.workspace }}/scripts/hisiv300.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)
          set(CMAKE_C_COMPILER /opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-gcc)
          set(CMAKE_SYSROOT /opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/armv5te_arm9_soft)
          set(CMAKE_FIND_ROOT_PATH ${CMAKE_SYSROOT})
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_EXE_LINKER_FLAGS "${CMAKE_EXE_LINKER_FLAGS} -L${CMAKE_SYSROOT}/lib -L${CMAKE_SYSROOT}/usr/lib -Wl,-rpath-link,${CMAKE_SYSROOT}/lib -Wl,-rpath-link,${CMAKE_SYSROOT}/usr/lib")
          EOF

      - name: Run Build
        run: |
          # Build your project
          # Note: Adjust the 'cmake' path if your CMakeLists.txt is not in the root
          cmake . -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/scripts/hisiv300.cmake
          make VERBOSE=1
          
          # Move your result files into the build_output folder
          # Change '*.bin' to match the extension of your compiled files (e.g., .so, .a, .elf)
          find . -name "*.bin" -o -name "*.so" -o -name "*.a" -exec cp {} ${{ github.workspace }}/build_output/ \;

      - name: Debug - List Found Files
        run: |
          echo "These are the files found after build:"
          ls -R ${{ github.workspace }}/build_output/

      - name: Upload Artifacts (Testing)
        uses: actions/upload-artifact@v4
        with:
          name: compiled-files
          path: ${{ github.workspace }}/build_output/

      - name: Create Release (Only on Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/build_output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
