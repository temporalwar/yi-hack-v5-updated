name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Toolchain
        run: |
          mkdir -p ${{ github.workspace }}/scripts
          mkdir -p ${{ github.workspace }}/output_binaries
          cat <<'EOF' > ${{ github.workspace }}/scripts/hisiv300.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)
          set(CMAKE_C_COMPILER /opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-gcc)
          set(CMAKE_SYSROOT /opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/armv5te_arm9_soft)
          set(CMAKE_FIND_ROOT_PATH ${CMAKE_SYSROOT})
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_EXE_LINKER_FLAGS "${CMAKE_EXE_LINKER_FLAGS} -L${CMAKE_SYSROOT}/lib -L${CMAKE_SYSROOT}/usr/lib -Wl,-rpath-link,${CMAKE_SYSROOT}/lib -Wl,-rpath-link,${CMAKE_SYSROOT}/usr/lib")
          EOF

      - name: Run Build
        run: |
          # Automatically find the directory containing CMakeLists.txt
          CMAKE_DIR=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          echo "Found CMakeLists.txt in: $CMAKE_DIR"
          
          # Move into that directory to build
          cd "$CMAKE_DIR"
          
          # Run cmake
          cmake . -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/scripts/hisiv300.cmake
          make VERBOSE=1
          
          # Find and move binaries back to the root output folder
          find . -type f \( -name "*.bin" -o -name "*.img" -o -name "*.so" -o -name "*.a" \) -exec cp {} ${{ github.workspace }}/output_binaries/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware-files
          path: ${{ github.workspace }}/output_binaries/