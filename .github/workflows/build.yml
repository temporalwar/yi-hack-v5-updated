name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# THIS IS THE FIX FOR PERMISSIONS:
permissions:
  contents: write # This allows the action to create releases and push files

# THIS IS THE FIX FOR THE NODE 20 WARNING:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Firmware
        run: |
          mkdir -p ${{ github.workspace }}/release_package
          # Sync files (excluding git/github folders)
          rsync -av --exclude='.git' --exclude='.github' --exclude='release_package' . ${{ github.workspace }}/release_package/
          # Create the tar.gz
          tar -czf yi-hack-v5-updated.tar.gz -C ${{ github.workspace }}/release_package .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yi-hack-v5-updated.tar.gz
          tag_name: latest
          name: Latest Build
          body: "Automated build of yi-hack-v5-updated. Extract the contents to your SD card."
          make_latest: true # This makes it the "Latest" release automatically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
