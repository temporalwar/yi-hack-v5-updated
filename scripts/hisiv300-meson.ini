# Meson cross-file for arm-hisiv300-linux-uclibcgnueabi
# Confirmed bin path: /opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/

[host_machine]
system     = 'linux'
cpu_family = 'arm'
cpu        = 'arm926ej-s'
endian     = 'little'

[build_machine]
system     = 'linux'
cpu_family = 'x86_64'
cpu        = 'x86_64'
endian     = 'little'

[binaries]
c        = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-gcc'
cpp      = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-g++'
ar       = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-ar'
ranlib   = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-ranlib'
strip    = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-strip'
pkg-config = 'pkg-config'

[properties]
c_args     = ['-mcpu=arm926ej-s', '-march=armv5te', '-mfloat-abi=soft',
              '-msoft-float', '-fno-short-enums',
              '-Os', '-ffunction-sections', '-fdata-sections']
c_link_args = ['-Wl,--gc-sections']

[cmake]
CMAKE_TOOLCHAIN_FILE = '/build/scripts/hisiv300.cmake'
