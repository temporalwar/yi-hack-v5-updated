# Meson cross-compilation file for arm-hisiv300-linux-uclibcgnueabi
# Used by: libfuse3
#
# Usage:
#   meson setup builddir srcdir --cross-file /build/scripts/hisiv300-meson.ini

[host_machine]
system     = 'linux'
cpu_family = 'arm'
cpu        = 'arm926ej-s'
endian     = 'little'

[build_machine]
system     = 'linux'
cpu_family = 'x86_64'
cpu        = 'x86_64'
endian     = 'little'

[binaries]
# Absolute paths so meson never picks up host tools
c        = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/bin/arm-hisiv300-linux-gcc'
cpp      = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/bin/arm-hisiv300-linux-g++'
ar       = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/bin/arm-hisiv300-linux-ar'
ranlib   = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/bin/arm-hisiv300-linux-ranlib'
strip    = '/opt/hisi-linux/x86-arm/arm-hisiv300-linux/target/bin/arm-hisiv300-linux-strip'
pkg-config = 'pkg-config'

[properties]
# sys_root is the staging dir passed in by the Makefile via env or CLI override
# Override at runtime with: meson setup ... -Dpkg_config_path=/your/staging/lib/pkgconfig
c_args     = ['-march=armv5te', '-mtune=arm926ej-s', '-msoft-float',
              '-Os', '-ffunction-sections', '-fdata-sections']
c_link_args = ['-Wl,--gc-sections']

[cmake]
# Tell CMake (if invoked by meson) to use our toolchain
CMAKE_TOOLCHAIN_FILE = '/build/scripts/hisiv300.cmake'
